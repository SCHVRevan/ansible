---
- name: Revoke CREATE on schema public from PUBLIC
  become_user: postgres
  community.postgresql.postgresql_query:
    port: "{{ postgres_port }}"
    db: "{{ db_name }}"
    query: "REVOKE CREATE ON SCHEMA public FROM PUBLIC;"

