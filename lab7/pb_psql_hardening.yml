# template is nearly a copy of the original pg_hba.conf
- name: Configure pg_hba.conf from template
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "{{ hba_file }}"
    owner: postgres
    group: postgres
    mode: '0600'
  notify: Reload postgresql
