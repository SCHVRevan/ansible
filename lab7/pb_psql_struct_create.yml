# Create user
- name: Create user
  become_user: postgres
  community.postgresql.postgresql_user:
    port: "{{ postgres_port }}"
    name: "{{ user }}"
    password: "123_qwe"
    encrypted: true
  no_log: true

- name: Add user to readers group
  become_user: postgres
  community.postgresql.postgresql_query:
    port: "{{ postgres_port }}"
    db: "{{ db_name }}"
    query: "GRANT {{ group }} TO {{ user }};"
