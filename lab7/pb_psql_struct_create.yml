# Create and configure group
- name: Create readers group
  become_user: postgres
  community.postgresql.postgresql_user:
    port: "{{ postgres_port }}"
    name: "{{ group }}"
    state: present
    role_attr_flags: NOLOGIN
    login_db: "{{ db_name }}"

- name: Grant CONNECT on database to readers group
  become_user: postgres
  community.postgresql.postgresql_query:
    port: "{{ postgres_port }}"
    db: "{{ db_name }}"
    query: "GRANT CONNECT ON DATABASE {{ db_name }} TO {{ group }};"

- name: Grant USAGE on schema public to readers group
  become_user: postgres
  community.postgresql.postgresql_query:
    port: "{{ postgres_port }}"
    db: "{{ db_name }}"
    query: "GRANT USAGE ON SCHEMA public TO {{ group }};"

- name: Grant SELECT on all tables in schema public to readers group
  become_user: postgres
  community.postgresql.postgresql_privs:
    port: "{{ postgres_port }}"
    db: "{{ db_name }}"
    privs: SELECT
    type: table
    objs: ALL_IN_SCHEMA
    schema: public
    role: "{{ group }}"
    state: present

