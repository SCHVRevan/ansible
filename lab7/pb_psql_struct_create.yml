---
- name: Remove password for postgres superuser
  become_user: postgres
  community.postgresql.postgresql_query:
    port: "{{ postgres_port }}"
    query: "ALTER ROLE postgres PASSWORD NULL;"

- name: Create database
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ db_name }}"
    port: "{{ postgres_port }}"
    state: present

